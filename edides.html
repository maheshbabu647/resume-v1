<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Resume Builder</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide-static@latest/umd/lucide.js"></script>
    
    <style>
        /* Hides the horizontal scrollbar on the section navigator for a cleaner mobile UI */
        /* For Firefox */
        #section-nav {
          scrollbar-width: none;
        }

        /* For Chrome, Safari, and Opera */
        #section-nav::-webkit-scrollbar {
          display: none;
        }

        /* A helper class for the preview's section titles */
        .section-title {
            @apply text-sm font-bold text-blue-700 mb-2 border-b-2 border-blue-100 pb-1 tracking-wider;
        }
    </style>
</head>
<body class="bg-gray-50">

    <div id="editor-view">
        <div id="editor-header" class="bg-white border-b border-gray-200 px-4 py-3 sticky top-0 z-10">
            </div>

        <div id="section-nav" class="bg-white border-b border-gray-200 overflow-x-auto">
            </div>

        <div id="section-content-wrapper" class="p-4 pb-24">
            </div>

        <div id="bottom-nav" class="bg-white border-t border-gray-200 p-4 fixed bottom-0 left-0 right-0">
            </div>
    </div>

    <div id="preview-view" class="hidden">
        </div>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- STATE MANAGEMENT ---
            // All application data is stored in this single 'state' object.
            const state = {
                currentSection: 'profile',
                isPreviewMode: false,
                expandedItemId: null, // ID of the item being edited (e.g., a specific job)
                formData: {
                    fullName: 'Your Name',
                    professionalTitle: 'Your Professional Title',
                    summary: 'Write a 2-4 sentence summary of your experience, skills, and career goals. Tailor this to the job you are applying for to highlight your most relevant qualifications.',
                    contact: {
                        phone: '123-456-7890',
                        email: 'your.email@example.com',
                        address: 'City, Country',
                        link: 'linkedin.com/in/yourprofile',
                    },
                    experience: [{
                        id: Date.now() + 1,
                        jobTitle: 'Senior Software Engineer',
                        company: 'Tech Solutions Inc.',
                        location: 'San Francisco, CA',
                        startDate: '2020-01',
                        endDate: 'Present',
                        description: '• Led a team of 5 engineers in developing scalable microservices.\n• Developed and maintained key features for a product with 1M+ users.\n• Improved application performance by 20% through code optimization.'
                    }],
                    education: [{
                        id: Date.now() + 2,
                        degree: 'Bachelor of Science in Computer Science',
                        institution: 'University of Technology',
                        graduationDate: '2020-05',
                        details: 'GPA: 3.8/4.0; Graduated with Honors.'
                    }],
                    skills: [
                        { id: Date.now() + 3, name: 'React & Next.js' },
                        { id: Date.now() + 4, name: 'Node.js & Express' },
                    ],
                    awards: [{ id: Date.now() + 5, name: 'Employee of the Month', issuer: 'Tech Solutions Inc.', date: '2021-08' }],
                    languages: [{ id: Date.now() + 6, name: 'English', proficiency: 'Native' }],
                }
            };

            // --- CONFIGURATION ---
            // Defines the structure and properties of each resume section.
            const sections = [
                { id: 'profile', name: 'Profile', icon: 'user', color: 'bg-blue-500', description: "Start with your name, title, and a compelling summary." },
                { id: 'contact', name: 'Contact', icon: 'phone', color: 'bg-green-500', description: "Provide ways for recruiters to contact you." },
                { id: 'experience', name: 'Experience', icon: 'briefcase', color: 'bg-purple-500', description: "Detail your professional roles and achievements." },
                { id: 'education', name: 'Education', icon: 'graduation-cap', color: 'bg-orange-500', description: "List your academic background." },
                { id: 'skills', name: 'Skills', icon: 'star', color: 'bg-pink-500', description: "Highlight your key technical and soft skills." },
                { id: 'awards', name: 'Awards', icon: 'award', color: 'bg-yellow-500', description: "Showcase any relevant recognitions." },
                { id: 'languages', name: 'Languages', icon: 'languages', color: 'bg-indigo-500', description: "List the languages you speak." }
            ];

            // --- DOM ELEMENT REFERENCES ---
            const editorView = document.getElementById('editor-view');
            const previewView = document.getElementById('preview-view');
            const editorHeader = document.getElementById('editor-header');
            const sectionNav = document.getElementById('section-nav');
            const sectionContentWrapper = document.getElementById('section-content-wrapper');
            const bottomNav = document.getElementById('bottom-nav');


            // --- RENDER FUNCTIONS ---
            // These functions generate HTML and update the page based on the current 'state'.

            /** Main render function that orchestrates all UI updates */
            function render() {
                if (state.isPreviewMode) {
                    editorView.classList.add('hidden');
                    previewView.classList.remove('hidden');
                    renderPreviewView();
                } else {
                    previewView.classList.add('hidden');
                    editorView.classList.remove('hidden');
                    renderEditorView();
                }
                // This is crucial for making the dynamically added icons appear
                lucide.createIcons();
            }
            
            /** Renders the entire editor interface */
            function renderEditorView() {
                const progress = calculateProgress();
                
                editorHeader.innerHTML = `
                    <div class="flex items-center justify-between mb-2">
                        <button class="p-2 -ml-2"><i data-lucide="chevron-left" class="text-gray-600"></i></button>
                        <h1 class="text-lg font-semibold text-gray-900">Resume Builder</h1>
                        <button id="preview-btn" class="flex items-center gap-1 bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm font-medium">
                            <i data-lucide="eye" class="w-4 h-4"></i> Preview
                        </button>
                    </div>
                    <div class="flex items-center justify-between text-sm text-gray-600">
                        <span>Progress: ${progress}%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-1.5 mt-2">
                        <div class="bg-blue-600 h-1.5 rounded-full" style="width: ${progress}%"></div>
                    </div>
                `;
                
                sectionNav.innerHTML = `
                    <div class="px-4 py-3 flex space-x-2">
                        ${sections.map(section => `
                            <button data-section-id="${section.id}" class="section-nav-btn flex-shrink-0 flex items-center gap-2 p-3 rounded-lg border-2 transition-all ${state.currentSection === section.id ? 'border-blue-500 bg-blue-50' : 'border-gray-200 bg-white'}">
                                <div class="p-1.5 rounded-md ${section.color}">
                                    <i data-lucide="${section.icon}" class="w-3.5 h-3.5 text-white"></i>
                                </div>
                                <span class="text-xs font-medium text-gray-700 leading-tight">${section.name}</span>
                            </button>
                        `).join('')}
                    </div>
                `;

                sectionContentWrapper.innerHTML = renderSectionContent();

                const currentIndex = sections.findIndex(s => s.id === state.currentSection);
                bottomNav.innerHTML = `
                    <div class="flex items-center justify-between gap-3">
                        <button id="prev-btn" ${currentIndex === 0 ? 'disabled' : ''} class="flex-1 bg-gray-100 text-gray-700 py-3 px-4 rounded-lg font-medium disabled:opacity-50">Previous</button>
                        <button id="next-btn" class="flex-1 flex items-center justify-center gap-2 bg-blue-600 text-white py-3 px-6 rounded-lg font-medium">
                            <i data-lucide="save" class="w-4 h-4"></i>
                            ${currentIndex === sections.length - 1 ? 'Finish' : 'Save & Next'}
                        </button>
                    </div>
                `;
            }

            /** Renders the form content for the currently selected section */
            function renderSectionContent() {
                const sectionData = sections.find(s => s.id === state.currentSection);
                let formContentHTML = '';

                switch (state.currentSection) {
                    case 'profile':
                        formContentHTML = `
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Full Name *</label>
                                    <input type="text" data-field="fullName" value="${state.formData.fullName}" class="form-input w-full p-3 border border-gray-300 rounded-lg"/>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Professional Title</label>
                                    <input type="text" data-field="professionalTitle" value="${state.formData.professionalTitle}" class="form-input w-full p-3 border border-gray-300 rounded-lg"/>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-2">Professional Summary</label>
                                    <textarea data-field="summary" rows="5" class="form-input w-full p-3 border border-gray-300 rounded-lg resize-none">${state.formData.summary}</textarea>
                                </div>
                            </div>`;
                        break;
                    case 'contact':
                        formContentHTML = `
                            <div class="space-y-3">
                                <input type="email" placeholder="Email" data-field="email" value="${state.formData.contact.email}" class="form-input w-full p-3 border rounded-lg" />
                                <input type="tel" placeholder="Phone" data-field="phone" value="${state.formData.contact.phone}" class="form-input w-full p-3 border rounded-lg" />
                                <input type="text" placeholder="Address (City, Country)" data-field="address" value="${state.formData.contact.address}" class="form-input w-full p-3 border rounded-lg" />
                                <input type="text" placeholder="Website/LinkedIn Link" data-field="link" value="${state.formData.contact.link}" class="form-input w-full p-3 border rounded-lg" />
                            </div>
                        `;
                        break;
                    case 'experience':
                    case 'education':
                    case 'skills':
                    case 'awards':
                    case 'languages':
                        formContentHTML = renderArraySection(state.currentSection);
                        break;
                }

                return `
                    <div class="bg-white rounded-lg shadow-sm border border-gray-200">
                        <div class="p-4 border-b border-gray-100">
                            <div class="flex items-center gap-3">
                                <div class="p-2 rounded-lg ${sectionData.color}">
                                    <i data-lucide="${sectionData.icon}" class="w-5 h-5 text-white"></i>
                                </div>
                                <h2 class="text-lg font-semibold text-gray-900">${sectionData.name}</h2>
                            </div>
                            <p class="text-sm text-gray-600 mt-2">${sectionData.description}</p>
                        </div>
                        <div class="p-4">${formContentHTML}</div>
                    </div>`;
            }
            
            /** Renders sections that contain a list of items (e.g., Work Experience) */
            function renderArraySection(sectionId) {
                const items = state.formData[sectionId];
                const title = sectionId.charAt(0).toUpperCase() + sectionId.slice(1, -1); // "skills" -> "Skill"

                const itemsHTML = items.map(item => {
                    return (item.id === state.expandedItemId) 
                        ? getFormForItem(sectionId, item)
                        : getSummaryForItem(sectionId, item);
                }).join('');

                return `
                    <div class="space-y-3">
                        ${itemsHTML}
                    </div>
                    <button data-action="add" data-section-id="${sectionId}" class="mt-4 flex items-center gap-2 w-full justify-center bg-blue-50 hover:bg-blue-100 text-blue-600 px-4 py-2.5 rounded-lg font-medium text-sm">
                        <i data-lucide="plus" class="w-4 h-4"></i> Add ${title}
                    </button>
                `;
            }

            /** Renders the preview view of the resume */
            function renderPreviewView() {
                const { fullName, professionalTitle, summary, contact, experience, education, skills, awards, languages } = state.formData;

                previewView.innerHTML = `
                    <div class="bg-white border-b border-gray-200 px-4 py-3 flex items-center justify-between sticky top-0 z-10">
                        <button id="back-to-edit-btn" class="flex items-center gap-2 text-gray-600">
                            <i data-lucide="chevron-left"></i> <span class="font-medium">Back to Edit</span>
                        </button>
                        <button class="flex items-center gap-2 bg-blue-600 text-white px-4 py-2 rounded-lg font-medium">
                            <i data-lucide="download" class="w-4 h-4"></i> PDF
                        </button>
                    </div>
                    <div class="p-4">
                        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-6 max-w-lg mx-auto">
                            <div class="text-center mb-6">
                                <h1 class="text-2xl font-bold text-gray-800 mb-1">${fullName}</h1>
                                <p class="text-gray-700 text-md mb-2">${professionalTitle}</p>
                                <p class="text-xs text-gray-500">${contact.address} | ${contact.email} | ${contact.phone}</p>
                            </div>
                            <div class="mb-5"><h2 class="section-title">SUMMARY</h2><p class="text-xs text-gray-700 leading-relaxed">${summary}</p></div>
                            ${experience.length > 0 ? `<div class="mb-5"><h2 class="section-title">WORK EXPERIENCE</h2>${experience.map(exp => `
                                <div class="mb-3">
                                    <div class="flex justify-between items-start"><h3 class="text-sm font-semibold">${exp.jobTitle || ''}</h3><p class="text-xs text-gray-500">${exp.startDate || ''} - ${exp.endDate || ''}</p></div>
                                    <p class="text-xs text-gray-600">${exp.company || ''} | ${exp.location || ''}</p>
                                    <ul class="mt-1 text-xs text-gray-700 list-disc list-inside whitespace-pre-wrap">${(exp.description || '').split('\n').map(line => line ? `<li>${line.replace(/•/g, '')}</li>` : '').join('')}</ul>
                                </div>`).join('')}</div>` : ''}
                            ${education.length > 0 ? `<div class="mb-5"><h2 class="section-title">EDUCATION</h2>${education.map(edu => `
                                <div class="flex justify-between items-start mb-1 text-xs">
                                    <div><p class="font-semibold">${edu.degree || ''}</p><p class="text-gray-600">${edu.institution || ''}</p></div>
                                    <p class="text-gray-500 text-right">${edu.graduationDate || ''}</p>
                                </div>`).join('')}</div>` : ''}
                            ${skills.length > 0 ? `<div class="mb-5"><h2 class="section-title">SKILLS</h2><div class="flex flex-wrap gap-2">${skills.map(skill => `<span class="bg-blue-50 text-blue-700 text-xs font-medium px-2.5 py-1 rounded-full">${skill.name || ''}</span>`).join('')}</div></div>` : ''}
                        </div>
                    </div>`;
            }


            // --- EVENT HANDLERS & LOGIC ---

            /** Main click handler using event delegation */
            function handleClick(e) {
                const target = e.target.closest('button, [data-action="edit"]');
                if (!target) return;

                const { id, dataset } = target;
                
                // Main navigation
                if (id === 'preview-btn') state.isPreviewMode = true;
                if (id === 'back-to-edit-btn') state.isPreviewMode = false;
                if (id === 'next-btn') navigateNext();
                if (id === 'prev-btn') navigatePrevious();
                
                // Section navigation
                if (target.classList.contains('section-nav-btn')) {
                    state.currentSection = dataset.sectionId;
                }

                // Array item actions (Add, Edit, Save, Delete)
                if (dataset.action === 'add') handleAddItem(dataset.sectionId);
                if (dataset.action === 'edit') state.expandedItemId = parseInt(dataset.itemId);
                if (dataset.action === 'save') state.expandedItemId = null;
                if (dataset.action === 'delete') handleDeleteItem(dataset.sectionId, parseInt(dataset.itemId));

                render();
            }

            /** Main input handler using event delegation */
            function handleInput(e) {
                const { dataset, value } = e.target;
                if (!dataset.field) return;

                if (dataset.itemId) { // Input is for an array item (e.g., a specific job title)
                    const sectionId = dataset.sectionId;
                    const itemId = parseInt(dataset.itemId);
                    const field = dataset.field;
                    const item = state.formData[sectionId].find(i => i.id === itemId);
                    if (item) item[field] = value;
                } else if(state.currentSection === 'contact') {
                    state.formData.contact[dataset.field] = value;
                }
                else { // Input is for a top-level field (e.g., fullName)
                    state.formData[dataset.field] = value;
                }
            }
            
            function handleAddItem(sectionId) {
                const newItem = { id: Date.now() };
                state.formData[sectionId].push(newItem);
                state.expandedItemId = newItem.id;
            }
            
            function handleDeleteItem(sectionId, itemId) {
                state.formData[sectionId] = state.formData[sectionId].filter(item => item.id !== itemId);
                if (state.expandedItemId === itemId) state.expandedItemId = null;
            }

            function navigateNext() {
                const currentIndex = sections.findIndex(s => s.id === state.currentSection);
                if (currentIndex < sections.length - 1) {
                    state.currentSection = sections[currentIndex + 1].id;
                    state.expandedItemId = null;
                }
            }

            function navigatePrevious() {
                const currentIndex = sections.findIndex(s => s.id === state.currentSection);
                if (currentIndex > 0) {
                    state.currentSection = sections[currentIndex - 1].id;
                    state.expandedItemId = null;
                }
            }
            
            function calculateProgress() {
                let score = 0;
                const totalPoints = sections.length;
                if (state.formData.fullName && state.formData.fullName !== 'Your Name') score++;
                if (state.formData.contact.email && state.formData.contact.email !== 'your.email@example.com') score++;
                if (state.formData.experience.length > 0) score++;
                if (state.formData.education.length > 0) score++;
                if (state.formData.skills.length > 0) score++;
                if (state.formData.awards.length > 0) score++;
                if (state.formData.languages.length > 0) score++;
                return Math.round((score / totalPoints) * 100);
            }
            
            
            // --- HTML GENERATOR UTILITY FUNCTIONS ---
            
            /** Returns HTML for a collapsed item summary */
            function getSummaryForItem(sectionId, item) {
                let summaryText;
                switch(sectionId) {
                    case 'experience': summaryText = `<p class="font-medium text-sm text-gray-800">${item.jobTitle || 'New Job'}</p><p class="text-xs text-gray-500">${item.company || 'Company'}</p>`; break;
                    case 'education': summaryText = `<p class="font-medium text-sm text-gray-800">${item.degree || 'New Degree'}</p><p class="text-xs text-gray-500">${item.institution || 'Institution'}</p>`; break;
                    case 'skills': summaryText = `<p class="font-medium text-sm text-gray-800">${item.name || 'New Skill'}</p>`; break;
                    case 'awards': summaryText = `<p class="font-medium text-sm text-gray-800">${item.name || 'New Award'}</p><p class="text-xs text-gray-500">${item.issuer || 'Issuer'}</p>`; break;
                    case 'languages': summaryText = `<p class="font-medium text-sm text-gray-800">${item.name || 'New Language'}</p><p class="text-xs text-gray-500">${item.proficiency || 'Proficiency'}</p>`; break;
                }
                return `
                    <div data-action="edit" data-item-id="${item.id}" class="border border-gray-200 rounded-lg p-3 flex justify-between items-center cursor-pointer hover:bg-gray-50">
                        <div>${summaryText}</div>
                        <i data-lucide="chevron-down" class="text-gray-400"></i>
                    </div>`;
            }

            /** Returns HTML for an expanded item form */
            function getFormForItem(sectionId, item) {
                let formHTML;
                const commonDataAttrs = `data-section-id="${sectionId}" data-item-id="${item.id}"`;
                switch(sectionId) {
                    case 'experience':
                        formHTML = `<div class="space-y-3">
                            <input type="text" placeholder="Job Title" ${commonDataAttrs} data-field="jobTitle" value="${item.jobTitle || ''}" class="form-input w-full p-2 border rounded-md" />
                            <input type="text" placeholder="Company" ${commonDataAttrs} data-field="company" value="${item.company || ''}" class="form-input w-full p-2 border rounded-md" />
                            <input type="text" placeholder="Location" ${commonDataAttrs} data-field="location" value="${item.location || ''}" class="form-input w-full p-2 border rounded-md" />
                            <div class="flex gap-2">
                                <input type="text" placeholder="Start Date" onfocus="(this.type='month')" onblur="(this.type='text')" ${commonDataAttrs} data-field="startDate" value="${item.startDate || ''}" class="form-input w-full p-2 border rounded-md" />
                                <input type="text" placeholder="End Date" onfocus="(this.type='month')" onblur="(this.type='text')" ${commonDataAttrs} data-field="endDate" value="${item.endDate || ''}" class="form-input w-full p-2 border rounded-md" />
                            </div>
                            <textarea placeholder="Description..." rows="4" ${commonDataAttrs} data-field="description" class="form-input w-full p-2 border rounded-md resize-none text-sm">${item.description || ''}</textarea>
                        </div>`; break;
                    case 'education':
                        formHTML = `<div class="space-y-3">
                            <input type="text" placeholder="Degree" ${commonDataAttrs} data-field="degree" value="${item.degree || ''}" class="form-input w-full p-2 border rounded-md" />
                            <input type="text" placeholder="Institution" ${commonDataAttrs} data-field="institution" value="${item.institution || ''}" class="form-input w-full p-2 border rounded-md" />
                            <input type="text" placeholder="Graduation Date" onfocus="(this.type='month')" onblur="(this.type='text')" ${commonDataAttrs} data-field="graduationDate" value="${item.graduationDate || ''}" class="form-input w-full p-2 border rounded-md" />
                        </div>`; break;
                    case 'skills':
                        formHTML = `<input type="text" placeholder="Skill" ${commonDataAttrs} data-field="name" value="${item.name || ''}" class="form-input w-full p-2 border rounded-md" />`; break;
                    case 'awards':
                        formHTML = `<div class="space-y-3">
                            <input type="text" placeholder="Award Name" ${commonDataAttrs} data-field="name" value="${item.name || ''}" class="form-input w-full p-2 border rounded-md" />
                            <input type="text" placeholder="Issuer" ${commonDataAttrs} data-field="issuer" value="${item.issuer || ''}" class="form-input w-full p-2 border rounded-md" />
                        </div>`; break;
                    case 'languages':
                        formHTML = `<div class="space-y-3">
                            <input type="text" placeholder="Language" ${commonDataAttrs} data-field="name" value="${item.name || ''}" class="form-input w-full p-2 border rounded-md" />
                            <input type="text" placeholder="Proficiency" ${commonDataAttrs} data-field="proficiency" value="${item.proficiency || ''}" class="form-input w-full p-2 border rounded-md" />
                        </div>`; break;
                }

                return `<div class="border border-gray-200 rounded-lg p-4">
                    ${formHTML}
                    <div class="flex justify-end gap-2 mt-3">
                        <button data-action="delete" ${commonDataAttrs} class="text-gray-500 hover:text-red-600 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        <button data-action="save" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium">Done</button>
                    </div>
                </div>`;
            }

            // --- INITIALIZATION ---
            // Set up event listeners and perform the initial render.
            document.body.addEventListener('click', handleClick);
            document.body.addEventListener('input', handleInput);
            render();
        });
    </script>
</body>
</html>
