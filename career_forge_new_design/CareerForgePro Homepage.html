<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareerForgePro — Stop rewriting your resume for every job.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="cfp-v3-components.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #fff; overflow-x: hidden; }
    * { -webkit-font-smoothing: antialiased; }
    ::selection { background: #5046E4; color: #fff; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #F7F6FF; }
    ::-webkit-scrollbar-thumb { background: #5046E4; border-radius: 3px; }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    input::placeholder { color: rgba(136,136,165,0.6); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "brandColor": "#8e4343",
      "ctaColor": "#FF5C35",
      "showTestimonials": true,
      "showBento": true,
      "view": "signup",
      "currentRoute": "cover-letters",
      "userState": "pro"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      return (
        <div>
          <NavbarV3 />
          <HeroV3New tweaks={tweaks} />
          <LogoStripV3 />
          <FeatureTabsV3 />
          <InlineCTA />
          {tweaks.showTestimonials && <TestimonialsV3 />}
          {tweaks.showBento && <BentoGrid />}
          <PricingV3 />
          <RoadmapV3 />
          <FAQV3 />
          <CTAFinalV3 />
          <FooterV3 />

          <TweaksPanel>
            <TweakSection title="Brand">
              <TweakColor label="Brand colour" value={tweaks.brandColor} onChange={v => setTweak('brandColor', v)} />
              <TweakColor label="CTA colour" value={tweaks.ctaColor} onChange={v => setTweak('ctaColor', v)} />
            </TweakSection>
            <TweakSection title="Sections">
              <TweakToggle label="Show use-case grid" value={tweaks.showBento} onChange={v => setTweak('showBento', v)} />
              <TweakToggle label="Show testimonials" value={tweaks.showTestimonials} onChange={v => setTweak('showTestimonials', v)} />
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
