<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareerForgePro — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="cfp-auth.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100vh; overflow: hidden; }
    body { background: #FFFFFF; font-family: 'Plus Jakarta Sans', sans-serif; color: #0F0E2A; }
    * { -webkit-font-smoothing: antialiased; }
    ::selection { background: #5046E4; color: #fff; }
    button, input { font-family: inherit; }
    input:focus { outline: none; }
    @keyframes float-slow { 0%,100% { transform: translateY(0) rotate(0deg);} 50% { transform: translateY(-10px) rotate(2deg);} }
    @keyframes pulse-glow { 0%,100% { opacity: 0.6;} 50% { opacity: 1;} }
    @keyframes shimmer { 0% { background-position: -200% 0;} 100% { background-position: 200% 0;} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "view": "login"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      // Read ?view= URL param on mount so links from Homepage can deep-link to Sign in vs Sign up
      React.useEffect(() => {
        const v = new URLSearchParams(window.location.search).get('view');
        if (v && ['signup','login','verify','forgot','reset'].includes(v) && v !== tweaks.view) {
          setTweak('view', v);
        }
      }, []);

      return (
        <div>
          <AuthShell view={tweaks.view} setView={v => setTweak('view', v)} />

          <TweaksPanel>
            <TweakSection title="Auth state">
              <TweakSelect label="Show screen" value={tweaks.view} onChange={v => setTweak('view', v)}
                options={[
                  {value: 'signup', label: 'Sign up'},
                  {value: 'login', label: 'Log in'},
                  {value: 'verify', label: 'Verify email (code)'},
                  {value: 'forgot', label: 'Forgot password'},
                  {value: 'reset', label: 'Reset password'},
                ]} />
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
