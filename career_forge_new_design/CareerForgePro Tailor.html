<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareerForgePro — Tailor to job</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Source+Serif+4:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="cfp-tailor.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; }
    body { background: #F5F4FB; font-family: 'Plus Jakarta Sans', sans-serif; color: #0F0E2A; }
    * { -webkit-font-smoothing: antialiased; }
    ::selection { background: #5046E4; color: #fff; }
    button, input, textarea { font-family: inherit; }
    input:focus, textarea:focus { outline: none; }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D8D5EA; border-radius: 5px; border: 2px solid transparent; background-clip: padding-box; }
    ::-webkit-scrollbar-thumb:hover { background: #B5B0D5; background-clip: padding-box; border: 2px solid transparent; }

    @keyframes pulse-glow {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.85; }
    }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "screen": "input",
      "userState": "anonymous"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      return (
        <div>
          <TailorFlow
            screen={tweaks.screen}
            onScreenChange={(s) => setTweak('screen', s)}
            userState={tweaks.userState}
          />
          <TweaksPanel>
            <TweakSection title="Tailor flow">
              <TweakSelect label="Screen" value={tweaks.screen} onChange={v => setTweak('screen', v)}
                options={[
                  { value: 'input', label: '1. Input (pick resume + JD)' },
                  { value: 'report', label: '2. Report' },
                  { value: 'smart', label: '3. Smart review' },
                  { value: 'opening', label: '4. Opening editor' },
                ]} />
              <TweakRadio label="User state" value={tweaks.userState} onChange={v => setTweak('userState', v)}
                options={[
                  { value: 'anonymous', label: 'Anonymous' },
                  { value: 'free', label: 'Logged in' },
                ]} />
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
